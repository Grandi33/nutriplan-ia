# Configuración de despliegue para Render (https://render.com)
# Render leerá este archivo y configurará el servicio automáticamente.
services:
  - type: web
    name: nutriplan-ia
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      # La clave se introduce a mano en el panel de Render (no se sube al repo).
      - key: ANTHROPIC_API_KEY
        sync: false
      # (Opcional) Modelo principal (plan semanal). Por defecto: claude-sonnet-4-6.
      - key: NUTRIPLAN_MODEL
        value: claude-sonnet-4-6
      # (Opcional) Modelo barato para recetas/alternativas. Por defecto: Haiku.
      - key: NUTRIPLAN_MODEL_FAST
        value: claude-haiku-4-5-20251001
