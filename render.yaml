# Configuración de despliegue para Render (https://render.com)
# Render leerá este archivo y configurará el servicio automáticamente.
services:
  - type: web
    name: nutriplan-ia
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      # Clave GRATIS de Google AI Studio (Gemini). Se introduce a mano en Render.
      - key: GEMINI_API_KEY
        sync: false
      # (Opcional) Modelo principal (plan semanal). Por defecto: gemini-2.5-flash.
      - key: NUTRIPLAN_MODEL
        value: gemini-2.5-flash
      # (Opcional) Modelo para recetas/alternativas. Por defecto: gemini-2.5-flash.
      - key: NUTRIPLAN_MODEL_FAST
        value: gemini-2.5-flash
